name: Stanford STVP Subtheme
type: theme
description: 'Stanford STVP Subtheme.'
package: Stanford
version: 1.0.0
core_version_requirement: ^9 || ^10 || ^11
base theme: stanford_basic
libraries:
  - stvp_subtheme/allpages

regions:
  page_top: 'Page top'
  header: Header
  search: Search
  menu: Menu
  help: Help
  content: Content
  footer: Footer
  page_bottom: 'Page bottom'

components:
  namespaces:
    stvp: templates
    stvp_subtheme: templates/components

libraries-override:
  stanford_basic/decoupled_menu:
    js:
      decoupled-menu/dist/islands/main-menu.island.js: decoupled-menu/dist/islands/main-menu.island.umd.js
