# Example react_behaviors plugin definitions.
# Plugin property $defaults are defined in ReactBehaviorsPluginManager.
banner_variant_info:  # part of the key after the :
  id: banner_type
  label: 'Banner Paragraphs Type'
  bundles:
    - paragraphs_type|stanford_banner
  config:
    banner_style:
      type: select
      title: Banner Style
      description: Select the background color for displaying this banner.
      default_value: stvp-wrapper--banner-default
      options:
        stvp-wrapper--banner-default: Red (Default)
        stvp-wrapper--banner-palo-verde: Palo Verde
        stvp-wrapper--banner-sky: Sky
        stvp-wrapper--banner-plum: Plum
        stvp-wrapper--banner-illuminating: Illuminating
        stvp-wrapper--banner-grey: Light Grey
        stvp-wrapper--banner-poppy: Poppy
    banner_wave:
      type: select
      title: Banner Wave Decoration
      description: Choose the wave decoration at the bottom of the banner.
      empty_option: None
      options:
        stvp-banner-wave-1: Wave 1
        stvp-banner-wave-2: Wave 2
        stvp-banner-wave-3: Wave 3

page_title_banner_info:
  id: page_title_banner_type
  label: Page Title Banner Theme
  bundles:
    - paragraphs_type|stanford_page_title_banner
  config:
    title_style:
      type: select
      title: Page Title Color Theme
      description: Select the color theme for displaying the page title.
      default_value: page-theme--red
      options:
        page-theme--red: Red (Default)
        page-theme--palo-verde: Palo Verde
        page-theme--sky: Sky
        page-theme--plum: Plum
        page-theme--illuminating: Illuminating
        page-theme--poppy: Poppy
    title_wave:
      type: select
      title: Title Wave Decoration
      description: Choose the wave decoration for the page title.
      empty_option: None
      options:
        page-theme--wave-grey: Grey Wave
    ecorner_option:
      type: checkbox
      title: eCorner Style
      description: Whether to use the eCorner styles.
      default_value: false
layout_variant_info:
  id: layout_style
  label: 'Layout Paragraph Type'
  bundles:
    - paragraphs_type|stanford_layout
  config:
    section_wave:
      type: select
      title: Section Wave
      description: Choose the section background wave.
      empty_option: Default
      options:
        stvp-section-wave-none: None
        stvp-section-wave-1: Wave 1
        stvp-section-wave-2: Wave 2
        stvp-section-wave-3: Wave 3
        stvp-section-wave-4: Wave 4

tinted_background:
  id: tinted_background
  label: 'Text Area Background'
  bundles:
    - paragraphs_type|stanford_wysiwyg
  config:
    tinted_background:
      type: select
      title: 'Background Color'
      description: 'Select the background color for displaying this text.'
      options:
        stvp-text-background--none: None
        stvp-text-background--sky: Sky
        stvp-text-background--palo-verde: Palo Verde
        stvp-text-background--plum: Plum
        stvp-text-background--illuminating: Illuminating
        stvp-text-background--grey: Grey
        stvp-text-background--light-grey: Light Grey
        stvp-text-background--poppy: Poppy
