name: Video, Podcasts, and Rich Media
machine_name: media-search
type: pdb
description: 'Filterable list of media using Algolia'
package: React
core_version_requirement: ^10 || ^11
module_status: active
presentation: react
path: /jsonapi/node/stanford_event
add_js:
  footer:
    'dist/islands/media-search.island.js': {minified: true}
configuration:
  media_search_index:
    type: textfield
    title: Index
    default_value: prod_STVP
  media_search_filters:
    type: textfield
    title: Hidden Filter
    default_value: 'type:Audio/Visual'
